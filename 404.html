<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Page not found — Calculate</title>
<meta name="description" content="That page does not exist on Calculate. Head back to the homepage for the full list of 70+ free, instant calculators for money, health, home and school.">
<meta name="color-scheme" content="light only">
<meta name="theme-color" content="#f6f4ef">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="icon" href="favicon-96.png" type="image/png" sizes="96x96">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<style>
:root{--fs-m:16px;--fs-l:20px;--fs-xl:28px;--fs-2xl:clamp(38px,6.5vw,64px)}

:root{--paper:#f6f4ef;--ink:#1c1b19;--muted:#6f6a60;--signal:#c96a1b;--hair:#dcd8cf;--card:#fbfaf7}
*{box-sizing:border-box;margin:0;padding:0}
html{cursor:default}
body{font-family:'IBM Plex Sans',system-ui,-apple-system,'Segoe UI',sans-serif;background:#f6f4ef;background:var(--paper);color:#1c1b19;color:var(--ink);
 min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;line-height:1.4}
.card{max-width:560px;width:100%;background:#fbfaf7;background:var(--card);border:1px solid var(--hair);border-radius:18px;
 padding:44px 36px;box-shadow:inset 0 1px 0 rgba(255,255,255,.7)}
.brand{font-weight:700;font-size:var(--fs-l);color:#1c1b19;color:var(--ink);text-decoration:none;letter-spacing:-.01em}
.brand .eq{color:#c96a1b;color:var(--signal);margin-right:2px}
h1{font-size:var(--fs-2xl);font-weight:700;letter-spacing:-.03em;line-height:1;margin:24px 0 8px;color:#c96a1b;color:var(--signal)}
p.big{font-size:var(--fs-l);font-weight:600;margin-bottom:8px}
p.sub{font-size:var(--fs-m);color:#6f6a60;color:var(--muted);margin-bottom:28px}
a.btn{display:inline-block;font-size:var(--fs-m);font-weight:700;padding:.7em 1.2em;border-radius:11px;text-decoration:none;
 background:#1c1b19;background:var(--ink);color:#f6f4ef;color:var(--paper);cursor:pointer;margin-right:10px;margin-bottom:10px}
a.ghost{background:transparent;color:#1c1b19;color:var(--ink);border:1px solid var(--hair)}
.links{margin-top:22px;padding-top:18px;border-top:1px solid var(--hair);font-size:var(--fs-m);color:#6f6a60;color:var(--muted)}
.links a{color:#1c1b19;color:var(--ink);text-decoration:none;font-weight:600}
.links a:hover{color:#c96a1b;color:var(--signal)}

/* ---- cursor policy: arrow everywhere, pointer only on interactive things ---- */
* { cursor: default; }

a, button, label, summary, select,
[role="button"], [role="link"], [role="tab"],
.btn, [onclick] {
  cursor: pointer;
}

/* text fields keep the I-beam */
input:not([type="button"]):not([type="submit"]):not([type="reset"]):not([type="checkbox"]):not([type="radio"]):not([type="range"]),
textarea,
[contenteditable="true"] {
  cursor: text;
}

/* clickable inputs */
input[type="checkbox"], input[type="radio"], input[type="range"] { cursor: pointer; }

/* disabled controls */
:disabled, [disabled], [aria-disabled="true"] { cursor: not-allowed; }

input,kbd,time,output{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1,"lnum" 1}

a{text-decoration:none}

/* form controls never below 16px — iOS auto-zooms the page otherwise */
input,select,textarea{font-size:max(16px,1em)}

@media(max-width:560px){.btn{display:flex;width:100%;justify-content:center;margin:0 0 10px}}

/* number inputs: hide spinners — they render on top of a right-hand unit */
.field input[type="number"],.in input[type="number"]{-moz-appearance:textfield;appearance:textfield}
.field input[type="number"]::-webkit-outer-spin-button,.field input[type="number"]::-webkit-inner-spin-button,
.in input[type="number"]::-webkit-outer-spin-button,.in input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
/* guarantee clearance for a right-hand unit even without :has() support */
.field.hasunit.r input,.in.hasunit.r input{padding-left:.7em;padding-right:46px}
.field .unit.r,.in .unit.r{left:auto;right:12px}
.field .in:has(> .unit.r) input{padding-right:46px}
</style>
</head>
<body>
<main class="card">
  <a class="brand" href="/"><span class="eq">=</span>Calculate</a>
  <h1>404</h1>
  <p class="big">That page does not add up.</p>
  <p class="sub">The address might be mistyped, or the page moved. Everything we have is one tap away.</p>
  <a class="btn" href="/">Browse all 70+ calculators</a>
  <a class="btn ghost" href="/percentage-calculator.html">Percentage</a>
  <div class="links">Popular: <a href="/mortgage-calculator.html">Mortgage</a> · <a href="/inflation-calculator.html">Inflation</a> · <a href="/bmi-calculator.html">BMI</a> · <a href="/gpa-calculator.html">GPA</a> · <a href="/tip-calculator.html">Tip</a></div>
</main>
</body>
</html>
